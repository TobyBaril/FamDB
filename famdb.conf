# famdb.conf - FamDB site configuration
#
# Set FAMDB_DATA_DIR to the directory containing the FamDB *.h5 files.
# This is used as the default when -i is not provided on the command line.
# The path must point to an existing directory.
#
# Precedence order:
#   1. -i / --db-dir command-line option (highest)
#   2. FAMDB_DATA_DIR below (if set and the directory exists)
#   3. Libraries/famdb relative to the famdb.py installation directory
#
# Example:
#   FAMDB_DATA_DIR = /usr/local/RepeatMasker/Libraries/famdb
#
[famdb]
# FAMDB_DATA_DIR = /path/to/famdb/directory
